<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨屿 · 文学疗愈空间</title>
  <meta name="description" content="在诗词和文学中，安放你的迷茫、焦虑与疲惫。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">墨<span>屿</span></div>
      <div class="nav-actions">
        <button class="nav-btn active" id="nav-explore">探索</button>
        <button class="nav-btn" id="nav-fav">收藏</button>
        <button class="nav-btn" id="nav-journal">便签</button>
      </div>
    </div>
  </header>

  <!-- Explore Section -->
  <div class="page-section active" id="explore-section">
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <div class="hero-quote" id="hero-quote"></div>
        <div class="hero-source" id="hero-source"></div>
        <div class="hero-mood-tags" id="mood-tags"></div>
        <div style="margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
          <button class="nav-btn" id="random-btn" style="font-size: 14px; padding: 8px 22px;">
            &#x1F500; 随机一首
          </button>
        </div>
      </div>
    </section>

    <!-- Poem Card -->
    <section class="poem-section">
      <div class="container">
        <div class="poem-card fade-in" id="poem-card">
          <div class="daily-badge" id="poem-daily-badge" style="display:none;"></div>
          <div class="poem-card-header">
            <div class="poem-title-group">
              <div class="poem-title" id="poem-title"></div>
              <div class="poem-author" id="poem-author"></div>
            </div>
            <div class="poem-actions">
              <button class="icon-btn" id="fav-btn" title="收藏 / 取消收藏">
                <span class="icon-text">&#x2661;</span>
                <span class="tooltip">收藏</span>
              </button>
            </div>
          </div>
          <div class="poem-text" id="poem-text"></div>
          <div class="poem-translation" id="poem-translation">
            <div class="poem-translation-label">&#x2014; 读懂它 &#x2014;</div>
            <div class="poem-translation-body"></div>
          </div>
          <div class="poem-reflection" id="poem-reflection"></div>
        </div>

        <!-- Mood Navigator -->
        <div class="mood-nav" id="mood-nav"></div>
      </div>
    </section>
  </div>

  <!-- Favorites Section -->
  <div class="page-section" id="favorites-section">
    <section class="favorites-section show" style="padding-top: 100px;">
      <div class="container">
        <div class="favorites-title">&#x2665; 我的收藏</div>
        <div id="favorites-list"></div>
      </div>
    </section>
  </div>

  <!-- Journal Section -->
  <div class="page-section" id="journal-section">
    <section class="journal-section show" style="padding-top: 100px;">
      <div class="container">
        <div class="journal-title">&#x270D; 书写感悟</div>
        <textarea class="journal-textarea" id="journal-text" placeholder="读这首诗的时候，你想到了什么？写下你的心情吧……"></textarea>
        <button class="journal-save-btn" id="journal-save-btn">保存</button>
        <div class="journal-entries" id="journal-entries"></div>
      </div>
    </section>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      墨屿 &middot; 在诗词中安放心事 &middot; 按 <kbd>R</kbd> 随机 &middot; <kbd>F</kbd> 收藏 &middot; <kbd>D</kbd> 每日推荐
    </div>
  </footer>

  <script src="js/poems.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
